// ========== ATTENDANCE ==========
const Attendance = {
  selectedGroup: '',
  selectedDate: '',
  marks: {},

  render() {
    const players = App.getMyPlayers().filter(p => p.status === 'active');
    const groups = [...new Set(players.map(p => p.group))].sort();
    if (!Attendance.selectedDate) Attendance.selectedDate = DB.todayISO();

    let html = `
    <div class="filter-bar">
      <select id="attGroup" onchange="Attendance.selectedGroup=this.value;Attendance.loadMarks()">
        <option value="">-- اختر المجموعة --</option>
        ${groups.map(g => `<option value="${g}" ${Attendance.selectedGroup===g?'selected':''}>${g}</option>`).join('')}
      </select>
      <input type="date" value="${Attendance.selectedDate}" onchange="Attendance.selectedDate=this.value;Attendance.loadMarks()">
      ${Attendance.selectedGroup ? `<button class="btn btn-primary" onclick="Attendance.saveAll()"><i class="fas fa-save"></i> حفظ الحضور</button>` : ''}
    </div>`;

    if (!Attendance.selectedGroup) {
      html += `<div class="empty-state"><i class="fas fa-clipboard-check"></i><p>اختر المجموعة لبدء تسجيل الحضور</p></div>`;
    } else {
      const gPlayers = players.filter(p => p.group === Attendance.selectedGroup);
      if (gPlayers.length === 0) {
        html += `<div class="empty-state"><i class="fas fa-users"></i><p>لا يوجد لاعبون في هذه المجموعة</p></div>`;
      } else {
        html += `<div class="attendance-grid">`;
        gPlayers.forEach(p => {
          const mark = Attendance.marks[p.id] || '';
          html += `<div class="attendance-row">
            <div class="player-name">${p.name}</div>
            <div class="attendance-btns">
              <button class="att-btn present ${mark==='present'?'selected':''}" onclick="Attendance.mark('${p.id}','present')">حاضر ✓</button>
              <button class="att-btn absent ${mark==='absent'?'selected':''}" onclick="Attendance.mark('${p.id}','absent')">غائب ✗</button>
              <button class="att-btn late ${mark==='late'?'selected':''}" onclick="Attendance.mark('${p.id}','late')">متأخر ⏰</button>
            </div>
            ${mark==='late' ? `<a href="${waLink(p.parentPhone, `مرحباً، نود إعلامكم بأن ${p.name} تأخر اليوم ${DB.fmtDate(new Date(Attendance.selectedDate))} عن تدريب أكاديمية جرين هيل. نرجو الالتزام بالمواعيد. شكراً 🟢`)}" target="_blank" class="btn btn-whatsapp btn-sm"><i class="fab fa-whatsapp"></i> إرسال تنبيه</a>` : ''}
          </div>`;
        });
        html += `</div>`;
      }
    }

    // Recent attendance history
    const allAtt = DB.get('attendance') || [];
    const recentDates = [...new Set(allAtt.map(a => a.date))].sort((a,b) => DB.parseDate(b) - DB.parseDate(a)).slice(0, 5);
    if (recentDates.length > 0) {
      html += `<div class="section-title" style="margin-top:30px"><i class="fas fa-history"></i> آخر سجلات الحضور</div>`;
      recentDates.forEach(date => {
        const dayAtt = allAtt.filter(a => a.date === date);
        const present = dayAtt.filter(a => a.status === 'present').length;
        const absent = dayAtt.filter(a => a.status === 'absent').length;
        const late = dayAtt.filter(a => a.status === 'late').length;
        html += `<div style="background:white;padding:14px 18px;border-radius:var(--radius-sm);margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <strong>${date}</strong>
          <div style="display:flex;gap:12px">
            <span class="badge-status badge-present">حاضر: ${present}</span>
            <span class="badge-status badge-absent">غائب: ${absent}</span>
            <span class="badge-status badge-late">متأخر: ${late}</span>
          </div>
        </div>`;
      });
    }

    document.getElementById('page-attendance').innerHTML = html;
  },

  loadMarks() {
    Attendance.marks = {};
    if (!Attendance.selectedGroup || !Attendance.selectedDate) { Attendance.render(); return; }
    const dateStr = DB.fmtDate(new Date(Attendance.selectedDate));
    const att = DB.get('attendance') || [];
    att.filter(a => a.date === dateStr && a.group === Attendance.selectedGroup).forEach(a => {
      Attendance.marks[a.playerId] = a.status;
    });
    Attendance.render();
  },

  mark(playerId, status) {
    if (Attendance.marks[playerId] === status) {
      delete Attendance.marks[playerId];
    } else {
      Attendance.marks[playerId] = status;
    }
    Attendance.render();
  },

  saveAll() {
    if (!Attendance.selectedGroup) return;
    const dateStr = DB.fmtDate(new Date(Attendance.selectedDate));
    let att = DB.get('attendance') || [];
    // Remove existing for this group+date
    att = att.filter(a => !(a.date === dateStr && a.group === Attendance.selectedGroup));
    // Add new
    Object.entries(Attendance.marks).forEach(([playerId, status]) => {
      att.push({ id: DB.genId(), playerId, group: Attendance.selectedGroup, date: dateStr, status });
    });
    DB.set('attendance', att);
    Toast.success('تم حفظ الحضور بنجاح');
    Attendance.render();
  }
};

// ========== PAYMENTS ==========
const Payments = {
  tab: 'payments',

  render() {
    const players = App.getMyPlayers().filter(p => p.status === 'active');
    const allPayments = DB.get('payments') || [];
    const cm = DB.currentMonth();

    let html = `
    <div class="tabs">
      <button class="tab-btn ${Payments.tab==='payments'?'active':''}" onclick="Payments.tab='payments';Payments.render()">المدفوعات</button>
      <button class="tab-btn ${Payments.tab==='debts'?'active':''}" onclick="Payments.tab='debts';Payments.render()">المديونية</button>
    </div>`;

    if (Payments.tab === 'payments') {
      html += `
      <div class="filter-bar">
        <button class="btn btn-primary" onclick="Payments.showPaymentForm()"><i class="fas fa-plus"></i> تسجيل دفعة</button>
      </div>
      <div class="table-container"><div class="table-responsive"><table>
        <thead><tr><th>اللاعب</th><th>التاريخ</th><th>المبلغ</th><th>الطريقة</th><th>ملاحظات</th><th>إجراءات</th></tr></thead><tbody>`;
      const monthPayments = allPayments.filter(p => DB.getMonth(p.date) === cm).sort((a,b) => DB.parseDate(b.date) - DB.parseDate(a.date));
      if (monthPayments.length === 0) {
        html += `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-money-bill-wave"></i><p>لا توجد مدفوعات هذا الشهر</p></div></td></tr>`;
      }
      monthPayments.forEach(p => {
        const player = players.find(x => x.id === p.playerId) || App.getMyPlayers().find(x => x.id === p.playerId);
        html += `<tr>
          <td style="font-weight:600">${player?player.name:'-'}</td>
          <td>${p.date}</td>
          <td class="paid-amount">${DB.fmtMoney(p.amount)} ج</td>
          <td>${p.method==='cash'?'كاش':'تحويل'}</td>
          <td>${p.notes||'-'}</td>
          <td><button class="btn btn-sm btn-outline" onclick="Invoices.generateInvoice('${p.id}')"><i class="fas fa-file-invoice"></i></button></td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    } else {
      // Debts view
      const debtList = [];
      players.forEach(p => {
        if (p.paymentType !== 'monthly') return;
        const pPay = allPayments.filter(x => x.playerId === p.id && DB.getMonth(x.date) === cm);
        const paid = pPay.reduce((s,x) => s + x.amount, 0);
        const owed = (p.monthlyFee || 0) - paid;
        if (owed > 0) debtList.push({ player: p, paid, owed, fee: p.monthlyFee });
      });
      debtList.sort((a,b) => b.owed - a.owed);

      html += `<div class="table-container"><div class="table-header"><h4><i class="fas fa-exclamation-triangle" style="color:var(--warning)"></i> قائمة المديونية - الشهر الحالي</h4></div>
        <div class="table-responsive"><table>
        <thead><tr><th>اللاعب</th><th>المجموعة</th><th>الاشتراك</th><th>المدفوع</th><th>المتبقي</th><th>تذكير</th></tr></thead><tbody>`;
      if (debtList.length === 0) {
        html += `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-check-circle" style="color:var(--success)"></i><p>لا توجد مديونية! 🎉</p></div></td></tr>`;
      }
      debtList.forEach(d => {
        html += `<tr>
          <td style="font-weight:600">${d.player.name}</td>
          <td>${d.player.group}</td>
          <td>${DB.fmtMoney(d.fee)} ج</td>
          <td class="paid-amount">${DB.fmtMoney(d.paid)} ج</td>
          <td class="debt-amount">${DB.fmtMoney(d.owed)} ج</td>
          <td><a href="${waLink(d.player.parentPhone, `مرحباً، تذكير بسداد رسوم ${d.player.name} بمبلغ ${d.owed} جنيه لأكاديمية جرين هيل. شكراً لتعاونكم 🟢`)}" target="_blank" class="btn btn-whatsapp btn-sm"><i class="fab fa-whatsapp"></i> تذكير</a></td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    }
    document.getElementById('page-payments').innerHTML = html;
  },

  showPaymentForm(playerId) {
    const players = App.getMyPlayers().filter(p => p.status === 'active');
    Modal.open(`
      <div class="modal-header"><h3><i class="fas fa-money-bill-wave" style="color:var(--success)"></i> تسجيل دفعة جديدة</h3><button class="modal-close" onclick="Modal.close()"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label>اللاعب *</label><select id="payPlayer">${players.map(p=>`<option value="${p.id}" ${p.id===playerId?'selected':''}>${p.name} (${p.group})</option>`).join('')}</select></div>
        <div class="form-row">
          <div class="form-group"><label>المبلغ (جنيه) *</label><input id="payAmount" type="number" placeholder="0"></div>
          <div class="form-group"><label>التاريخ</label><input id="payDate" type="date" value="${DB.todayISO()}"></div>
        </div>
        <div class="form-group"><label>طريقة الدفع</label><select id="payMethod"><option value="cash">كاش</option><option value="transfer">تحويل بنكي</option></select></div>
        <div class="form-group"><label>ملاحظات</label><textarea id="payNotes" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="Payments.savePayment()"><i class="fas fa-save"></i> حفظ الدفعة</button>
        <button class="btn btn-outline" onclick="Modal.close()">إلغاء</button>
      </div>
    `);
  },

  savePayment() {
    const playerId = document.getElementById('payPlayer').value;
    const amount = parseFloat(document.getElementById('payAmount').value);
    const dateVal = document.getElementById('payDate').value;
    if (!playerId || !amount || amount <= 0) { Toast.error('يرجى ملء جميع الحقول المطلوبة'); return; }
    const dateStr = DB.fmtDate(new Date(dateVal));
    const payment = {
      id: DB.genId(), playerId, amount, date: dateStr,
      method: document.getElementById('payMethod').value,
      notes: document.getElementById('payNotes').value.trim()
    };
    const payments = DB.get('payments') || [];
    payments.push(payment);
    DB.set('payments', payments);

    // Auto-create invoice
    const invoices = DB.get('invoices') || [];
    const receiptNo = 'GH-' + String(invoices.length + 1).padStart(3, '0');
    invoices.push({ id: DB.genId(), paymentId: payment.id, playerId, amount, date: dateStr, receiptNo });
    DB.set('invoices', invoices);

    Toast.success('تم تسجيل الدفعة بنجاح');
    Modal.close();
    Payments.render();
  }
};

// ========== INVOICES ==========
const Invoices = {
  render() {
    const invoices = (DB.get('invoices') || []).sort((a,b) => DB.parseDate(b.date) - DB.parseDate(a.date));
    const players = DB.get('players') || [];

    let html = `
    <div class="table-container">
      <div class="table-header"><h4><i class="fas fa-file-invoice" style="color:var(--primary)"></i> جميع الفواتير</h4></div>
      <div class="table-responsive"><table>
        <thead><tr><th>رقم الإيصال</th><th>اللاعب</th><th>المبلغ</th><th>التاريخ</th><th>تحميل</th></tr></thead><tbody>`;
    if (invoices.length === 0) {
      html += `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-file-invoice"></i><p>لا توجد فواتير</p></div></td></tr>`;
    }
    invoices.forEach(inv => {
      const player = players.find(p => p.id === inv.playerId);
      html += `<tr>
        <td style="font-weight:700;color:var(--primary)">${inv.receiptNo}</td>
        <td>${player?player.name:'-'}</td>
        <td class="paid-amount">${DB.fmtMoney(inv.amount)} ج</td>
        <td>${inv.date}</td>
        <td><button class="btn btn-sm btn-primary" onclick="Invoices.downloadPDF('${inv.id}')"><i class="fas fa-file-pdf"></i> PDF</button></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('page-invoices').innerHTML = html;
  },

  generateInvoice(paymentId) {
    const invoices = DB.get('invoices') || [];
    const existing = invoices.find(i => i.paymentId === paymentId);
    if (existing) {
      Invoices.downloadPDF(existing.id);
      return;
    }
    const payments = DB.get('payments') || [];
    const payment = payments.find(p => p.id === paymentId);
    if (!payment) return;
    const receiptNo = 'GH-' + String(invoices.length + 1).padStart(3, '0');
    const inv = { id: DB.genId(), paymentId, playerId: payment.playerId, amount: payment.amount, date: payment.date, receiptNo };
    invoices.push(inv);
    DB.set('invoices', invoices);
    Invoices.downloadPDF(inv.id);
  },

  downloadPDF(invId) {
    const invoices = DB.get('invoices') || [];
    const inv = invoices.find(i => i.id === invId);
    if (!inv) return;
    const players = DB.get('players') || [];
    const player = players.find(p => p.id === inv.playerId);

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });

      // Header
      doc.setFillColor(27, 94, 32);
      doc.rect(0, 0, 148, 35, 'F');
      doc.setTextColor(255, 215, 0);
      doc.setFontSize(18);
      doc.text('Green Hill Football Academy', 74, 14, { align: 'center' });
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.text('Payment Receipt', 74, 24, { align: 'center' });

      // Body
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(12);
      const y = 48;
      doc.text(`Receipt No: ${inv.receiptNo}`, 130, y, { align: 'right' });
      doc.text(`Date: ${inv.date}`, 130, y + 10, { align: 'right' });
      doc.text(`Player: ${player ? player.name : '-'}`, 130, y + 22, { align: 'right' });
      doc.text(`Group: ${player ? player.group : '-'}`, 130, y + 32, { align: 'right' });

      doc.setDrawColor(27, 94, 32);
      doc.setLineWidth(0.5);
      doc.line(18, y + 40, 130, y + 40);

      doc.setFontSize(16);
      doc.setTextColor(27, 94, 32);
      doc.text(`Amount: ${inv.amount} EGP`, 74, y + 54, { align: 'center' });

      doc.setFontSize(9);
      doc.setTextColor(150, 150, 150);
      doc.text('Thank you for your payment!', 74, y + 70, { align: 'center' });
      doc.text('Green Hill Football Academy', 74, y + 78, { align: 'center' });

      doc.save(`Invoice_${inv.receiptNo}.pdf`);
      Toast.success('تم تحميل الفاتورة بنجاح');
    } catch(e) {
      Toast.error('خطأ في إنشاء PDF: ' + e.message);
    }
  }
};

// ========== COACHES ==========
const Coaches = {
  viewingCoach: null,

  render() {
    if (Coaches.viewingCoach) { Coaches.renderProfile(); return; }
    const coaches = DB.get('coaches') || [];
    const advances = DB.get('advances') || [];
    const salaryPayments = DB.get('salaryPayments') || [];
    const cm = DB.currentMonth();

    let html = `
    <div class="filter-bar">
      <button class="btn btn-primary" onclick="Coaches.showForm()"><i class="fas fa-plus"></i> إضافة مدرب</button>
    </div>
    <div class="table-container"><div class="table-responsive"><table>
      <thead><tr><th>الاسم</th><th>الهاتف</th><th>التخصص</th><th>المجموعات</th><th>الراتب</th><th>السلف</th><th>المستحق</th><th>إجراءات</th></tr></thead><tbody>`;
    coaches.forEach(c => {
      const monthAdv = advances.filter(a => a.coachId === c.id && DB.getMonth(a.date) === cm).reduce((s,a) => s + a.amount, 0);
      const monthPaid = salaryPayments.filter(s => s.coachId === c.id && DB.getMonth(s.date) === cm).reduce((s,p) => s + p.amount, 0);
      const net = (c.salary || 0) - monthAdv - monthPaid;
      html += `<tr>
        <td><span style="font-weight:600;cursor:pointer;color:var(--primary)" onclick="Coaches.viewCoach('${c.id}')">${c.name}</span></td>
        <td>${c.phone}</td>
        <td>${c.specialization}</td>
        <td>${(c.groups||[]).join(', ')}</td>
        <td>${DB.fmtMoney(c.salary)} ج</td>
        <td class="debt-amount">${DB.fmtMoney(monthAdv)} ج</td>
        <td style="font-weight:700;color:${net>=0?'var(--success)':'var(--danger)'}">${DB.fmtMoney(net)} ج</td>
        <td>
          <button class="btn btn-sm btn-outline" onclick="Coaches.viewCoach('${c.id}')"><i class="fas fa-eye"></i></button>
          <button class="btn btn-sm btn-primary" onclick="Coaches.showForm('${c.id}')"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-danger" onclick="Coaches.deleteCoach('${c.id}')"><i class="fas fa-trash"></i></button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('page-coaches').innerHTML = html;
  },

  showForm(id) {
    let c = { name:'', phone:'', specialization:'', groups:[], salary:5000 };
    let title = 'إضافة مدرب جديد';
    if (id) {
      const coaches = DB.get('coaches') || [];
      c = coaches.find(x => x.id === id) || c;
      title = 'تعديل بيانات المدرب';
    }
    Modal.open(`
      <div class="modal-header"><h3><i class="fas fa-chalkboard-teacher" style="color:var(--primary)"></i> ${title}</h3><button class="modal-close" onclick="Modal.close()"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>الاسم الكامل *</label><input id="cName" value="${c.name}"></div>
          <div class="form-group"><label>الهاتف *</label><input id="cPhone" value="${c.phone}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>التخصص</label><input id="cSpec" value="${c.specialization}"></div>
          <div class="form-group"><label>الراتب الأساسي (جنيه)</label><input id="cSalary" type="number" value="${c.salary}"></div>
        </div>
        <div class="form-group"><label>المجموعات المسؤول عنها</label>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
            ${GROUPS.map(g => `<label style="display:flex;align-items:center;gap:4px;font-size:0.85rem;cursor:pointer"><input type="checkbox" class="cGroupCheck" value="${g}" ${(c.groups||[]).includes(g)?'checked':''}> ${g}</label>`).join('')}
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="Coaches.save('${id||''}')"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn btn-outline" onclick="Modal.close()">إلغاء</button>
      </div>
    `);
  },

  save(id) {
    const name = document.getElementById('cName').value.trim();
    const phone = document.getElementById('cPhone').value.trim();
    if (!name || !phone) { Toast.error('يرجى ملء الحقول المطلوبة'); return; }
    const groups = Array.from(document.querySelectorAll('.cGroupCheck:checked')).map(c => c.value);
    const coaches = DB.get('coaches') || [];
    const data = { name, phone, specialization: document.getElementById('cSpec').value.trim(), salary: parseInt(document.getElementById('cSalary').value)||0, groups };
    if (id) {
      const idx = coaches.findIndex(c => c.id === id);
      if (idx >= 0) coaches[idx] = { ...coaches[idx], ...data };
      Toast.success('تم تحديث بيانات المدرب');
    } else {
      data.id = DB.genId();
      coaches.push(data);
      Toast.success('تم إضافة المدرب بنجاح');
    }
    DB.set('coaches', coaches);
    Modal.close();
    Coaches.render();
  },

  deleteCoach(id) {
    const coaches = DB.get('coaches') || [];
    const c = coaches.find(x => x.id === id);
    Modal.confirm(`هل أنت متأكد من حذف المدرب "${c?c.name:''}"؟`, () => {
      DB.set('coaches', coaches.filter(x => x.id !== id));
      Toast.success('تم حذف المدرب');
      Coaches.viewingCoach = null;
      Coaches.render();
    });
  },

  viewCoach(id) {
    Coaches.viewingCoach = id;
    Coaches.render();
  },

  renderProfile() {
    const id = Coaches.viewingCoach;
    const coaches = DB.get('coaches') || [];
    const c = coaches.find(x => x.id === id);
    if (!c) { Coaches.viewingCoach = null; Coaches.render(); return; }
    const advances = (DB.get('advances') || []).filter(a => a.coachId === id).sort((a,b) => DB.parseDate(b.date) - DB.parseDate(a.date));
    const salaryPayments = (DB.get('salaryPayments') || []).filter(s => s.coachId === id).sort((a,b) => DB.parseDate(b.date) - DB.parseDate(a.date));
    const cm = DB.currentMonth();
    const monthAdv = advances.filter(a => DB.getMonth(a.date) === cm).reduce((s,a) => s + a.amount, 0);
    const monthPaid = salaryPayments.filter(s => DB.getMonth(s.date) === cm).reduce((s,p) => s + p.amount, 0);
    const net = (c.salary||0) - monthAdv - monthPaid;
    const players = (DB.get('players') || []).filter(p => p.coachId === id && p.status === 'active');

    let html = `
    <button class="back-btn" onclick="Coaches.viewingCoach=null;Coaches.render()"><i class="fas fa-arrow-right"></i> العودة للقائمة</button>
    <div class="profile-section">
      <div class="profile-header-bar">
        <div class="profile-avatar"><i class="fas fa-chalkboard-teacher"></i></div>
        <div><h3>${c.name}</h3><div class="meta">${c.specialization} | ${(c.groups||[]).join(', ')}</div></div>
      </div>
      <div class="profile-body">
        <div class="info-grid">
          <div class="info-item"><label>الهاتف</label><span>${c.phone}</span></div>
          <div class="info-item"><label>الراتب الأساسي</label><span>${DB.fmtMoney(c.salary)} ج</span></div>
          <div class="info-item"><label>سلف الشهر</label><span class="debt-amount">${DB.fmtMoney(monthAdv)} ج</span></div>
          <div class="info-item"><label>المدفوع من الراتب</label><span>${DB.fmtMoney(monthPaid)} ج</span></div>
          <div class="info-item"><label>المستحق</label><span style="font-weight:700;color:${net>=0?'var(--success)':'var(--danger)'};">${DB.fmtMoney(net)} ج</span></div>
          <div class="info-item"><label>عدد اللاعبين</label><span>${players.length}</span></div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:18px">
      <button class="btn btn-accent" onclick="Coaches.showAdvanceForm('${id}')"><i class="fas fa-hand-holding-usd"></i> تسجيل سلفة</button>
      <button class="btn btn-success" onclick="Coaches.showSalaryForm('${id}')"><i class="fas fa-money-check-alt"></i> صرف راتب</button>
    </div>

    <div class="section-title"><i class="fas fa-hand-holding-usd"></i> سجل السلف</div>
    <div class="table-container"><div class="table-responsive"><table>
      <thead><tr><th>التاريخ</th><th>المبلغ</th><th>ملاحظات</th></tr></thead><tbody>`;
    if (advances.length === 0) html += `<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-light)">لا توجد سلف</td></tr>`;
    advances.forEach(a => {
      html += `<tr><td>${a.date}</td><td class="debt-amount">${DB.fmtMoney(a.amount)} ج</td><td>${a.notes||'-'}</td></tr>`;
    });
    html += `</tbody></table></div></div>

    <div class="section-title"><i class="fas fa-money-check-alt"></i> سجل صرف الرواتب</div>
    <div class="table-container"><div class="table-responsive"><table>
      <thead><tr><th>التاريخ</th><th>المبلغ</th><th>ملاحظات</th></tr></thead><tbody>`;
    if (salaryPayments.length === 0) html += `<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-light)">لا يوجد صرف رواتب</td></tr>`;
    salaryPayments.forEach(s => {
      html += `<tr><td>${s.date}</td><td class="paid-amount">${DB.fmtMoney(s.amount)} ج</td><td>${s.notes||'-'}</td></tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('page-coaches').innerHTML = html;
  },

  showAdvanceForm(coachId) {
    Modal.open(`
      <div class="modal-header"><h3><i class="fas fa-hand-holding-usd" style="color:var(--accent-dark)"></i> تسجيل سلفة</h3><button class="modal-close" onclick="Modal.close()"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>المبلغ *</label><input id="advAmount" type="number" placeholder="0"></div>
          <div class="form-group"><label>التاريخ</label><input id="advDate" type="date" value="${DB.todayISO()}"></div>
        </div>
        <div class="form-group"><label>ملاحظات</label><textarea id="advNotes" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-accent" onclick="Coaches.saveAdvance('${coachId}')"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn btn-outline" onclick="Modal.close()">إلغاء</button>
      </div>
    `);
  },

  saveAdvance(coachId) {
    const amount = parseFloat(document.getElementById('advAmount').value);
    if (!amount || amount <= 0) { Toast.error('أدخل مبلغ صحيح'); return; }
    const advances = DB.get('advances') || [];
    advances.push({ id: DB.genId(), coachId, date: DB.fmtDate(new Date(document.getElementById('advDate').value)), amount, notes: document.getElementById('advNotes').value.trim() });
    DB.set('advances', advances);
    Toast.success('تم تسجيل السلفة');
    Modal.close();
    Coaches.render();
  },

  showSalaryForm(coachId) {
    const coaches = DB.get('coaches') || [];
    const c = coaches.find(x => x.id === coachId);
    const advances = (DB.get('advances') || []).filter(a => a.coachId === coachId && DB.getMonth(a.date) === DB.currentMonth());
    const totalAdv = advances.reduce((s,a) => s + a.amount, 0);
    const salaryPayments = (DB.get('salaryPayments') || []).filter(s => s.coachId === coachId && DB.getMonth(s.date) === DB.currentMonth());
    const totalPaid = salaryPayments.reduce((s,p) => s + p.amount, 0);
    const net = (c?.salary||0) - totalAdv - totalPaid;

    Modal.open(`
      <div class="modal-header"><h3><i class="fas fa-money-check-alt" style="color:var(--success)"></i> صرف راتب</h3><button class="modal-close" onclick="Modal.close()"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <div style="background:#F0FFF4;padding:14px;border-radius:8px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>الراتب الأساسي:</span><strong>${DB.fmtMoney(c?.salary||0)} ج</strong></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>إجمالي سلف الشهر (مخصومة تلقائياً):</span><strong class="debt-amount">${DB.fmtMoney(totalAdv)} ج</strong></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span>المصروف سابقاً هذا الشهر:</span><strong>${DB.fmtMoney(totalPaid)} ج</strong></div>
          <div style="display:flex;justify-content:space-between;border-top:1px solid #C6F6D5;padding-top:6px"><span>الصافي المستحق الآن:</span><strong style="color:var(--primary);font-size:1.1rem">${DB.fmtMoney(net)} ج</strong></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>المبلغ المصروف *</label><input id="salAmount" type="number" value="${Math.max(0,net)}"></div>
          <div class="form-group"><label>التاريخ</label><input id="salDate" type="date" value="${DB.todayISO()}"></div>
        </div>
        <div class="form-group"><label>ملاحظات</label><textarea id="salNotes" rows="2">راتب شهر ${new Date().toLocaleDateString('ar-EG',{month:'long',year:'numeric'})}</textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="Coaches.saveSalary('${coachId}')"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn btn-outline" onclick="Modal.close()">إلغاء</button>
      </div>
    `);
  },

  saveSalary(coachId) {
    const amount = parseFloat(document.getElementById('salAmount').value);
    if (!amount || amount <= 0) { Toast.error('أدخل مبلغ صحيح'); return; }
    const salaryPayments = DB.get('salaryPayments') || [];
    salaryPayments.push({ id: DB.genId(), coachId, date: DB.fmtDate(new Date(document.getElementById('salDate').value)), amount, notes: document.getElementById('salNotes').value.trim() });
    DB.set('salaryPayments', salaryPayments);
    Toast.success('تم صرف الراتب بنجاح');
    Modal.close();
    Coaches.render();
  }
};

// ========== EXPENSES ==========
const Expenses = {
  render() {
    const expenses = (DB.get('expenses') || []).sort((a,b) => DB.parseDate(b.date) - DB.parseDate(a.date));
    const cm = DB.currentMonth();
    const monthTotal = expenses.filter(e => DB.getMonth(e.date) === cm).reduce((s,e) => s + (e.amount||0), 0);
    const categories = ['مرتبات', 'معدات', 'إيجار', 'متفرقات'];

    let html = `
    <div class="stats-grid">
      <div class="stat-card danger">
        <div class="stat-icon red"><i class="fas fa-receipt"></i></div>
        <div class="stat-value">${DB.fmtMoney(monthTotal)}</div>
        <div class="stat-label">إجمالي مصروفات الشهر</div>
      </div>
    </div>
    <div class="filter-bar">
      <button class="btn btn-primary" onclick="Expenses.showForm()"><i class="fas fa-plus"></i> إضافة مصروف</button>
    </div>
    <div class="table-container"><div class="table-responsive"><table>
      <thead><tr><th>التاريخ</th><th>الفئة</th><th>المبلغ</th><th>ملاحظات</th><th>إجراءات</th></tr></thead><tbody>`;
    if (expenses.length === 0) {
      html += `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-receipt"></i><p>لا توجد مصروفات</p></div></td></tr>`;
    }
    expenses.forEach(e => {
      html += `<tr>
        <td>${e.date}</td>
        <td><span class="badge-status badge-warning">${e.category}</span></td>
        <td class="debt-amount">${DB.fmtMoney(e.amount)} ج</td>
        <td>${e.notes||'-'}</td>
        <td><button class="btn btn-sm btn-danger" onclick="Expenses.deleteExpense('${e.id}')"><i class="fas fa-trash"></i></button></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
    document.getElementById('page-expenses').innerHTML = html;
  },

  showForm() {
    const categories = ['مرتبات', 'معدات', 'إيجار', 'متفرقات'];
    Modal.open(`
      <div class="modal-header"><h3><i class="fas fa-receipt" style="color:var(--danger)"></i> إضافة مصروف</h3><button class="modal-close" onclick="Modal.close()"><i class="fas fa-times"></i></button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>المبلغ *</label><input id="expAmount" type="number" placeholder="0"></div>
          <div class="form-group"><label>التاريخ</label><input id="expDate" type="date" value="${DB.todayISO()}"></div>
        </div>
        <div class="form-group"><label>الفئة *</label><select id="expCategory">${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
        <div class="form-group"><label>ملاحظات</label><textarea id="expNotes" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="Expenses.save()"><i class="fas fa-save"></i> حفظ</button>
        <button class="btn btn-outline" onclick="Modal.close()">إلغاء</button>
      </div>
    `);
  },

  save() {
    const amount = parseFloat(document.getElementById('expAmount').value);
    if (!amount || amount <= 0) { Toast.error('أدخل مبلغ صحيح'); return; }
    const expenses = DB.get('expenses') || [];
    expenses.push({
      id: DB.genId(),
      date: DB.fmtDate(new Date(document.getElementById('expDate').value)),
      category: document.getElementById('expCategory').value,
      amount,
      notes: document.getElementById('expNotes').value.trim()
    });
    DB.set('expenses', expenses);
    Toast.success('تم إضافة المصروف');
    Modal.close();
    Expenses.render();
  },

  deleteExpense(id) {
    Modal.confirm('هل أنت متأكد من حذف هذا المصروف؟', () => {
      const expenses = (DB.get('expenses') || []).filter(e => e.id !== id);
      DB.set('expenses', expenses);
      Toast.success('تم الحذف');
      Expenses.render();
    });
  }
};

// ========== REPORTS ==========
const Reports = {
  tab: 'daily',

  render() {
    const players = App.getMyPlayers();
    const activePlayers = players.filter(p => p.status === 'active');
    const allPayments = DB.get('payments') || [];
    const allAttendance = DB.get('attendance') || [];
    const allExpenses = DB.get('expenses') || [];
    const coaches = DB.get('coaches') || [];
    const salaryPayments = DB.get('salaryPayments') || [];
    const advances = DB.get('advances') || [];
    const today = DB.today();
    const cm = DB.currentMonth();
    const now = new Date();

    let html = `
    <div class="tabs">
      <button class="tab-btn ${Reports.tab==='daily'?'active':''}" onclick="Reports.tab='daily';Reports.render()">يومي</button>
      <button class="tab-btn ${Reports.tab==='weekly'?'active':''}" onclick="Reports.tab='weekly';Reports.render()">أسبوعي</button>
      <button class="tab-btn ${Reports.tab==='monthly'?'active':''}" onclick="Reports.tab='monthly';Reports.render()">شهري</button>
    </div>
    <div class="filter-bar">
      <button class="btn btn-primary" onclick="Reports.exportPDF()"><i class="fas fa-file-pdf"></i> تحميل PDF</button>
      <button class="btn btn-success" onclick="Reports.exportExcel()"><i class="fas fa-file-excel"></i> تحميل Excel</button>
    </div>`;

    if (Reports.tab === 'daily') {
      const todayAtt = allAttendance.filter(a => a.date === today);
      const present = todayAtt.filter(a => a.status === 'present').length;
      const absent = todayAtt.filter(a => a.status === 'absent').length;
      const late = todayAtt.filter(a => a.status === 'late').length;
      const todayPayments = allPayments.filter(p => p.date === today);
      const todayTotal = todayPayments.reduce((s,p) => s + p.amount, 0);

      html += `
      <h4 style="margin-bottom:16px">📊 التقرير اليومي - ${today}</h4>
      <div class="stats-grid">
        <div class="stat-card success"><div class="stat-icon green"><i class="fas fa-user-check"></i></div><div class="stat-value">${present}</div><div class="stat-label">حاضر</div></div>
        <div class="stat-card danger"><div class="stat-icon red"><i class="fas fa-user-times"></i></div><div class="stat-value">${absent}</div><div class="stat-label">غائب</div></div>
        <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-clock"></i></div><div class="stat-value">${late}</div><div class="stat-label">متأخر</div></div>
        <div class="stat-card accent"><div class="stat-icon gold"><i class="fas fa-money-bill-wave"></i></div><div class="stat-value">${DB.fmtMoney(todayTotal)}</div><div class="stat-label">محصّلات اليوم</div></div>
      </div>`;

      // Per-group attendance breakdown
      const groupsToday = [...new Set(todayAtt.map(a => a.group))];
      if (groupsToday.length > 0) {
        html += `<div class="table-container"><div class="table-header"><h4>تفصيل الحضور حسب المجموعة</h4></div><div class="table-responsive"><table>
          <thead><tr><th>المجموعة</th><th>حاضر</th><th>غائب</th><th>متأخر</th></tr></thead><tbody>`;
        groupsToday.forEach(g => {
          const gAtt = todayAtt.filter(a => a.group === g);
          html += `<tr><td style="font-weight:600">${g}</td>
            <td class="paid-amount">${gAtt.filter(a=>a.status==='present').length}</td>
            <td class="debt-amount">${gAtt.filter(a=>a.status==='absent').length}</td>
            <td>${gAtt.filter(a=>a.status==='late').length}</td></tr>`;
        });
        html += `</tbody></table></div></div>`;
      }

    } else if (Reports.tab === 'weekly') {
      const weekAgo = new Date(now);
      weekAgo.setDate(weekAgo.getDate() - 7);
      const weekAtt = allAttendance.filter(a => DB.parseDate(a.date) >= weekAgo);
      const weekPayments = allPayments.filter(p => DB.parseDate(p.date) >= weekAgo);
      const weekRevenue = weekPayments.reduce((s,p) => s + p.amount, 0);
      const weekNewPlayers = players.filter(p => DB.parseDate(p.regDate) >= weekAgo).length;
      const totalWeekAtt = weekAtt.length || 1;
      const weekPresentPct = Math.round((weekAtt.filter(a=>a.status==='present').length / totalWeekAtt) * 100);

      html += `
      <h4 style="margin-bottom:16px">📊 التقرير الأسبوعي</h4>
      <div class="stats-grid">
        <div class="stat-card success"><div class="stat-icon green"><i class="fas fa-percentage"></i></div><div class="stat-value">${weekPresentPct}%</div><div class="stat-label">نسبة الحضور الأسبوعي</div></div>
        <div class="stat-card accent"><div class="stat-icon gold"><i class="fas fa-money-bill-wave"></i></div><div class="stat-value">${DB.fmtMoney(weekRevenue)}</div><div class="stat-label">إيرادات الأسبوع</div></div>
        <div class="stat-card info"><div class="stat-icon blue"><i class="fas fa-user-plus"></i></div><div class="stat-value">${weekNewPlayers}</div><div class="stat-label">لاعبون جدد</div></div>
        <div class="stat-card danger"><div class="stat-icon red"><i class="fas fa-exclamation-circle"></i></div><div class="stat-value">${DB.fmtMoney(activePlayers.filter(p=>p.paymentType==='monthly').reduce((s,p)=>{const paid=allPayments.filter(x=>x.playerId===p.id&&DB.getMonth(x.date)===cm).reduce((ss,x)=>ss+x.amount,0);return s+Math.max(0,(p.monthlyFee||0)-paid);},0))}</div><div class="stat-label">المديونية المعلقة</div></div>
      </div>`;

      // Weekly per-group attendance
      const groups = [...new Set(weekAtt.map(a => a.group))];
      if (groups.length > 0) {
        html += `<div class="table-container"><div class="table-header"><h4>نسبة الحضور الأسبوعي حسب المجموعة</h4></div><div class="table-responsive"><table>
          <thead><tr><th>المجموعة</th><th>حاضر</th><th>غائب</th><th>متأخر</th><th>نسبة الحضور</th></tr></thead><tbody>`;
        groups.forEach(g => {
          const gAtt = weekAtt.filter(a => a.group === g);
          const pres = gAtt.filter(a=>a.status==='present').length;
          const pct = Math.round((pres / (gAtt.length||1)) * 100);
          html += `<tr><td style="font-weight:600">${g}</td>
            <td>${pres}</td><td>${gAtt.filter(a=>a.status==='absent').length}</td>
            <td>${gAtt.filter(a=>a.status==='late').length}</td>
            <td><span class="badge-status ${pct>=70?'badge-active':'badge-warning'}">${pct}%</span></td></tr>`;
        });
        html += `</tbody></table></div></div>`;
      }

    } else {
      // Monthly
      const monthPayments = allPayments.filter(p => DB.getMonth(p.date) === cm);
      const totalRevenue = monthPayments.reduce((s,p) => s + p.amount, 0);
      const expectedRevenue = activePlayers.filter(p => p.paymentType === 'monthly').reduce((s,p) => s + (p.monthlyFee||0), 0);
      const monthExpenses = allExpenses.filter(e => DB.getMonth(e.date) === cm).reduce((s,e) => s + e.amount, 0);
      const monthSalaryPaid = salaryPayments.filter(s => DB.getMonth(s.date) === cm).reduce((s,p) => s + p.amount, 0);
      const totalCoachSalaries = coaches.reduce((s,c) => s + (c.salary||0), 0);
      const netProfit = totalRevenue - monthExpenses - monthSalaryPaid;

      const monthAtt = allAttendance.filter(a => DB.getMonth(a.date) === cm);
      const presentPct = monthAtt.length ? Math.round((monthAtt.filter(a=>a.status==='present').length / monthAtt.length) * 100) : 0;

      html += `
      <h4 style="margin-bottom:16px">📊 التقرير الشهري - ${now.toLocaleDateString('ar-EG',{month:'long',year:'numeric'})}</h4>
      <div class="stats-grid">
        <div class="stat-card accent"><div class="stat-icon gold"><i class="fas fa-coins"></i></div><div class="stat-value">${DB.fmtMoney(expectedRevenue)}</div><div class="stat-label">الإيراد المتوقع</div></div>
        <div class="stat-card success"><div class="stat-icon green"><i class="fas fa-hand-holding-usd"></i></div><div class="stat-value">${DB.fmtMoney(totalRevenue)}</div><div class="stat-label">الإيراد الفعلي</div></div>
        <div class="stat-card danger"><div class="stat-icon red"><i class="fas fa-receipt"></i></div><div class="stat-value">${DB.fmtMoney(monthExpenses)}</div><div class="stat-label">المصروفات</div></div>
        <div class="stat-card info"><div class="stat-icon blue"><i class="fas fa-chalkboard-teacher"></i></div><div class="stat-value">${DB.fmtMoney(monthSalaryPaid)}/${DB.fmtMoney(totalCoachSalaries)}</div><div class="stat-label">الرواتب (المصروف/المستحق)</div></div>
        <div class="stat-card ${netProfit>=0?'success':'danger'}"><div class="stat-icon ${netProfit>=0?'green':'red'}"><i class="fas fa-chart-line"></i></div><div class="stat-value">${DB.fmtMoney(netProfit)}</div><div class="stat-label">صافي الربح</div></div>
        <div class="stat-card"><div class="stat-icon green"><i class="fas fa-percentage"></i></div><div class="stat-value">${presentPct}%</div><div class="stat-label">نسبة الحضور الشهري</div></div>
      </div>`;

      // Group revenue breakdown
      const groupRevenue = {};
      GROUPS.forEach(g => { groupRevenue[g] = 0; });
      monthPayments.forEach(pay => {
        const player = players.find(p => p.id === pay.playerId);
        if (player) groupRevenue[player.group] = (groupRevenue[player.group]||0) + pay.amount;
      });
      const topGroups = Object.entries(groupRevenue).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
      if (topGroups.length > 0) {
        html += `<div class="table-container"><div class="table-header"><h4>الإيرادات حسب المجموعة</h4></div><div class="table-responsive"><table>
          <thead><tr><th>المجموعة</th><th>الإيراد</th><th>عدد اللاعبين</th></tr></thead><tbody>`;
        topGroups.forEach(([g, rev]) => {
          const count = activePlayers.filter(p => p.group === g).length;
          html += `<tr><td style="font-weight:600">${g}</td><td class="paid-amount">${DB.fmtMoney(rev)} ج</td><td>${count}</td></tr>`;
        });
        html += `</tbody></table></div></div>`;
      }

      // Player changes
      const joined = players.filter(p => DB.getMonth(p.regDate) === cm).length;
      const left = players.filter(p => p.status === 'inactive').length;
      html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px">
        <div style="flex:1;min-width:150px;background:white;padding:16px;border-radius:var(--radius);box-shadow:var(--shadow);text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--success)">${joined}</div><div style="font-size:0.8rem;color:var(--text-light)">لاعبون انضموا هذا الشهر</div>
        </div>
        <div style="flex:1;min-width:150px;background:white;padding:16px;border-radius:var(--radius);box-shadow:var(--shadow);text-align:center">
          <div style="font-size:1.5rem;font-weight:800;color:var(--danger)">${left}</div><div style="font-size:0.8rem;color:var(--text-light)">لاعبون غير نشطين</div>
        </div>
      </div>`;
    }

    document.getElementById('page-reports').innerHTML = html;
  },

  getReportData() {
    const players = App.getMyPlayers();
    const activePlayers = players.filter(p => p.status === 'active');
    const allPayments = DB.get('payments') || [];
    const allAttendance = DB.get('attendance') || [];
    const allExpenses = DB.get('expenses') || [];
    const coaches = DB.get('coaches') || [];
    const salaryPayments = DB.get('salaryPayments') || [];
    const cm = DB.currentMonth();
    const now = new Date();
    const today = DB.today();

    if (Reports.tab === 'daily') {
      const todayAtt = allAttendance.filter(a => a.date === today);
      const todayPayments = allPayments.filter(p => p.date === today);
      return {
        title: 'التقرير اليومي - ' + today,
        rows: [
          ['البند', 'القيمة'],
          ['عدد الحاضرين', todayAtt.filter(a=>a.status==='present').length],
          ['عدد الغائبين', todayAtt.filter(a=>a.status==='absent').length],
          ['عدد المتأخرين', todayAtt.filter(a=>a.status==='late').length],
          ['محصّلات اليوم', todayPayments.reduce((s,p)=>s+p.amount,0) + ' ج']
        ]
      };
    } else if (Reports.tab === 'weekly') {
      const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate()-7);
      const weekAtt = allAttendance.filter(a => DB.parseDate(a.date) >= weekAgo);
      const weekPayments = allPayments.filter(p => DB.parseDate(p.date) >= weekAgo);
      return {
        title: 'التقرير الأسبوعي',
        rows: [
          ['البند', 'القيمة'],
          ['نسبة الحضور', Math.round((weekAtt.filter(a=>a.status==='present').length/(weekAtt.length||1))*100)+'%'],
          ['إيرادات الأسبوع', weekPayments.reduce((s,p)=>s+p.amount,0)+' ج'],
          ['لاعبون جدد', players.filter(p=>DB.parseDate(p.regDate)>=weekAgo).length]
        ]
      };
    } else {
      const monthPayments = allPayments.filter(p => DB.getMonth(p.date) === cm);
      const totalRevenue = monthPayments.reduce((s,p)=>s+p.amount,0);
      const expectedRevenue = activePlayers.filter(p=>p.paymentType==='monthly').reduce((s,p)=>s+(p.monthlyFee||0),0);
      const monthExpenses = allExpenses.filter(e=>DB.getMonth(e.date)===cm).reduce((s,e)=>s+e.amount,0);
      const monthSalaryPaid = salaryPayments.filter(s=>DB.getMonth(s.date)===cm).reduce((s,p)=>s+p.amount,0);
      return {
        title: 'التقرير الشهري - ' + now.toLocaleDateString('ar-EG',{month:'long',year:'numeric'}),
        rows: [
          ['البند', 'القيمة'],
          ['الإيراد المتوقع', expectedRevenue+' ج'],
          ['الإيراد الفعلي', totalRevenue+' ج'],
          ['المصروفات', monthExpenses+' ج'],
          ['الرواتب المصروفة', monthSalaryPaid+' ج'],
          ['صافي الربح', (totalRevenue-monthExpenses-monthSalaryPaid)+' ج'],
          ['عدد اللاعبين النشطين', activePlayers.length]
        ]
      };
    }
  },

  exportPDF() {
    try {
      const data = Reports.getReportData();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFillColor(27, 94, 32);
      doc.rect(0, 0, 210, 30, 'F');
      doc.setTextColor(255, 215, 0);
      doc.setFontSize(16);
      doc.text('Green Hill Football Academy - Report', 105, 12, { align: 'center' });
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(11);
      doc.text(data.title, 105, 22, { align: 'center' });

      doc.setTextColor(0, 0, 0);
      let y = 45;
      doc.setFontSize(10);

      // Table
      const colW = [120, 60];
      data.rows.forEach((row, idx) => {
        if (idx === 0) {
          doc.setFillColor(240, 240, 240);
          doc.rect(20, y - 5, 170, 8, 'F');
          doc.setFont(undefined, 'bold');
        } else {
          doc.setFont(undefined, 'normal');
        }
        doc.text(String(row[0]), 25, y);
        doc.text(String(row[1]), 145, y);
        y += 10;
      });

      doc.setFontSize(8);
      doc.setTextColor(150,150,150);
      doc.text('Generated by Green Hill Academy System', 105, 280, { align: 'center' });

      doc.save(`Report_${Reports.tab}_${DB.todayISO()}.pdf`);
      Toast.success('تم تحميل التقرير PDF');
    } catch(e) {
      Toast.error('خطأ في إنشاء PDF: ' + e.message);
    }
  },

  exportExcel() {
    try {
      const data = Reports.getReportData();
      const ws = XLSX.utils.aoa_to_sheet(data.rows);
      const wb = XLSX.utils.book_new();
      const safeTitle = data.title.replace(/[\[\]\*\?\/\\:]/g, '-').substring(0, 31);
      XLSX.utils.book_append_sheet(wb, ws, safeTitle);
      XLSX.writeFile(wb, `Report_${Reports.tab}_${DB.todayISO()}.xlsx`);
      Toast.success('تم تحميل التقرير Excel');
    } catch(e) {
      Toast.error('خطأ في إنشاء Excel: ' + e.message);
    }
  }
};

// ========== HANDLE KEYBOARD ==========
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    Modal.close();
  }
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
    App.login();
  }
});

// ========== INIT ==========
window.addEventListener('DOMContentLoaded', () => {
  App.init();
});
</script>
